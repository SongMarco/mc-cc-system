# personal.yml - 개인 프로젝트용 tmux 세션
#
# 사용법:
#   tmuxinator start personal   # 세션 시작
#   tmuxinator stop personal    # 세션 종료
#
# 새 프로젝트 추가 시:
#   windows 아래에 항목을 추가한다.
#   각 window는 tiled 레이아웃에 4개의 pane을 가진다.
#   root에 프로젝트 경로를 지정한다.
#
# 구조:
#   korea-monitor - 한국 모니터링 프로젝트
#   job-finder    - 잡 파인더 프로젝트

name: personal
attach: false

windows:
  - korea-monitor:
      root: ~/Documents/projects/korea-monitor
      layout: tiled
      panes:
        -
        -
        -
        -
  - job-finder:
      root: ~/Documents/projects/job-finder
      layout: tiled
      panes:
        -
        -
        -
        -
